[env:amb82-mini]
; Use the official Realtek Ameba package (smaller, faster)
platform = realtek
board = amb82_mini
framework = arduino

monitor_speed = 115200
upload_speed = 1500000

lib_deps =
  bblanchon/ArduinoJson@^7.0.4

; Configuration flags - edit these before flashing
build_flags =
  -D BOARD_AMB82_MINI
  -D GV_WIFI_SSID=\"YOUR_WIFI_SSID\"
  -D GV_WIFI_PASS=\"YOUR_WIFI_PASSWORD\"
  -D GV_SERVER_HOST=\"192.168.1.10\"
  -D GV_SERVER_PORT=8000
  -D GV_DEVICE_SECRET=\"replace_with_shared_iot_device_token\"
  -D GV_DEVICE_ID=\"00000000-0000-0000-0000-000000000001\"
  -D GV_EVENT_ID=\"00000000-0000-0000-0000-000000000001\"
  -D GV_GATE_LABEL=\"Gate_1\"
